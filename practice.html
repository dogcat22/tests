<!DOCTYPE html>
<html>
    <head>
        <title>Simple Simulation</title>
    </head>

    <body>
<a href="website.html">

        </a>

        <a href="morus-code.html">
            <button id="morus" style="background-color: lightblue; width: 100px; height: 40px;">Morus Code</button>

        <h1>Simple Simulation</h1>
        <p>Click to add sand particles. Right-click to remove them. Press 'Escape' to clear all particles. Press '1' to set the number of particles added per click.</p>        


        <canvas id="sandCanvas" width="400" height="400" style="border:3px solid black;"></canvas>
       
       <script>
        let numberOfParticles = 1; // default number of particles to add per click
        addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                // Clear all sand particles
                sandParticles.length = 0;
            }
            if (event.key === '1') {
                numberOfParticles = parseInt(prompt("Enter the number of particles to add per click:"));
            }
             if (event.key === '2') {
                numberOfParticles = 1; // reset to default
            }
        });

            const canvas = document.getElementById('sandCanvas');
            const ctx = canvas.getContext('2d');
            const sandParticles = [];

            canvas.addEventListener('mousedown', (event) => {
    
            
                for (let i = 0; i < numberOfParticles; i++) {
                    const rect = canvas.getBoundingClientRect();
                    let x = event.clientX - rect.left;
                    x = Math.floor(x / 5) * 5; // snap to grid
                    const y = event.clientY - rect.top;
                     sandParticles.push({x: x, y: y, vy: 0});
           
             
    
        }
                
            });
            canvas.addEventListener('contextmenu', (event) => {
                event.preventDefault();
                const rect = canvas.getBoundingClientRect();
                let x = event.clientX - rect.left;
                x = Math.floor(x / 5) * 5; // snap to grid
                const y = event.clientY - rect.top;
                // Remove particle at clicked position                    
                for (let i = sandParticles.length - 1; i >= 0; i--) {
                    const particle = sandParticles[i];
                    if (x >= particle.x && x < particle.x + 5 && y >= particle.y && y < particle.y + 5) {
                        sandParticles.splice(i, 1);
                        break;
                    }
                
            }
            });

            // Check if a particle is supported from below (left, center, or right)
            function hasSupport(particle) {
                const checkPositions = [
                    {x: particle.x - 5, y: particle.y - 5},      // left-bottom
                    {x: particle.x, y: particle.y - 5},          // center-bottom
                    {x: particle.x + 5, y: particle.y - 5}       // right-bottom
                ];

                for (let check of checkPositions) {
                    for (let other of sandParticles) {
                        if (other !== particle && 
                            check.x >= other.x && check.x < other.x + 5 && 
                            check.y >= other.y && check.y < other.y + 5) {
                        return true;
                        }
                    }
            }
                return false;
            }

            //cellular automata simulation
            function update() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let particle of sandParticles) {
                    if (particle.vy > 5) particle.vy = 4; // terminal velocity
                    particle.vy += 0.1; // gravity
                    particle.y += particle.vy;
                    
                    // collision detection with the floor
                    if (particle.y > canvas.height - 5) {
                        particle.y = canvas.height - 5;
                        particle.vy = 0;
                    }

                    // simple collision detection with other particles
                    let collided = false;
                    for (let other of sandParticles) {
                        if (other !== particle && 
                            particle.x < other.x + 5 && particle.x + 5 > other.x && 
                            particle.y < other.y + 5 && particle.y + 5 > other.y) {
                            particle.y = other.y - 5; // stack on top of the other particle
                            particle.vy = 0;
                            collided = true;
                            break;
                        }   
                    }

                    // Check if particle is supported; if not, make it fall off randomly
                    if (collided && !hasSupport(particle)) {
                       //If the cell below is occupied, check the cells below-left  below-right
                        const leftSupport = sandParticles.some(other => 
                            other !== particle && 
                            other.x === particle.x - 5 && 
                            other.y === particle.y + 5
                        );
                        const rightSupport = sandParticles.some(other => 
                            other !== particle && 
                            other.x === particle.x + 5 && 
                            other.y === particle.y + 5
                        );

                        if (!leftSupport && Math.random() < 0.5) {
                            particle.x -= 5; // move left
                        } else if (leftSupport && !rightSupport && Math.random() < 0.5) {
                            particle.x += 5; // move right
                        }
                       
                    }


                    ctx.fillStyle = 'sandybrown';
                    ctx.fillRect(particle.x, particle.y, 5, 5);
                }
                requestAnimationFrame(update);
            }

            update();

        </script>
    </body>
</html>
